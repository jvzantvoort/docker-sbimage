name: Update Dependencies

on:
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
  schedule:
    # Run monthly on the 1st at 4 AM UTC
    - cron: '0 4 1 * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-python-deps:
    name: Update Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pip-tools
        run: pip install pip-tools pip-review

      - name: Check for updates
        id: check
        run: |
          pip install -r requirements.txt --quiet
          pip-review --raw > updates.txt || true

          if [ -s updates.txt ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
            echo "## 📦 Available Updates" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat updates.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
            echo "✅ All dependencies up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set branch name
        if: steps.check.outputs.updates_available == 'true'
        run: echo "BRANCH_NAME=deps/python-updates-$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Update dependencies
        if: steps.check.outputs.updates_available == 'true'
        run: |
          pip-review --auto
          # Rewrite pinned versions in requirements.txt from the upgraded environment
          python3 - <<'EOF'
          import re, subprocess
          result = subprocess.run(['pip', 'freeze'], capture_output=True, text=True, check=True)
          installed = {}
          for line in result.stdout.splitlines():
              m = re.match(r'^([A-Za-z0-9][A-Za-z0-9._-]*)==([^=\s]+)$', line)
              if m:
                  installed[m.group(1).lower()] = m.group(2)
          with open('requirements.txt') as f:
              lines = f.readlines()
          updated = []
          pin_re = re.compile(r'^([A-Za-z0-9][A-Za-z0-9._-]*)==([^=\s]+)')
          for line in lines:
              m = pin_re.match(line)
              if m:
                  key = m.group(1).lower()
                  if key in installed:
                      line = pin_re.sub(
                          lambda _: f"{m.group(1)}=={installed[key]}", line, count=1
                      )
              updated.append(line)
          with open('requirements.txt', 'w') as f:
              f.writelines(updated)
          EOF

      - name: Create Pull Request
        if: steps.check.outputs.updates_available == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          base: master
          commit-message: "chore(deps): update Python dependencies"
          title: "chore(deps): Update Python dependencies"
          body: |
            ## Python Dependency Updates

            This PR updates pinned Python package versions in `requirements.txt`.

            **Update Type**: ${{ github.event.inputs.update_type || 'patch' }}

            ### Updated Packages

            See the workflow summary for details.

            ### Checklist
            - [ ] Review changelog for breaking changes
            - [ ] Test build: `buildah build .`
            - [ ] Verify smoke tests pass

            ---
            *Automated by GitHub Actions*
          labels: |
            dependencies
            python
            automated
          draft: true
