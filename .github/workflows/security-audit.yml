name: Security Audit

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  audit-dependencies:
    name: Audit Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'

      - name: Install safety
        run: pip install safety

      - name: Run safety check
        id: safety
        continue-on-error: true
        run: |
          safety check --file requirements.txt --json > safety-report.json
          safety check --file requirements.txt --output text

      - name: Check for vulnerabilities
        run: |
          if [ -f safety-report.json ]; then
            VULNS=$(jq '.vulnerabilities | length' safety-report.json 2>/dev/null || echo "0")
            echo "Found $VULNS vulnerabilities"
            
            if [ "$VULNS" -gt "0" ]; then
              echo "## ⚠️ Security Vulnerabilities Found" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Count**: $VULNS" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Please review the workflow logs for details." >> $GITHUB_STEP_SUMMARY
            else
              echo "## ✅ No Security Vulnerabilities" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload safety report
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        if: always()
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 30

  audit-container:
    name: Audit Container Image
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy on latest image
        uses: aquasecurity/trivy-action@f1a18f09e4449814a6f1898e6ea53e6e1db26d12 # 0.29.0
        with:
          image-ref: 'ghcr.io/jvzantvoort/sbimage:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@ea9e4e37992a54ee68a9622e985e60c8e8f12d9f # v3.27.5
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy summary report
        uses: aquasecurity/trivy-action@f1a18f09e4449814a6f1898e6ea53e6e1db26d12 # 0.29.0
        with:
          image-ref: 'ghcr.io/jvzantvoort/sbimage:latest'
          format: 'table'
          output: 'trivy-summary.txt'

      - name: Display summary
        if: always()
        run: |
          echo "## 🔒 Container Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat trivy-summary.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
